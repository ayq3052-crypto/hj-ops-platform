<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hour Jungle 營運工作台</title>
    <link rel="icon" href="data:," />
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --ink: #1e2421;
        --muted: #616d60;
        --line: #cfddc9;
        --paper: #ecf0e9;
        --panel: #fefffc;
        --accent: #536f55;
        --accent-soft: #eef7eb;
        --accent-line: #b2c9aa;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
        background: var(--paper);
      }

      main {
        width: min(980px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        align-items: center;
        gap: 30px;
        padding: 32px 0;
      }

      .identity {
        border-right: 1px solid rgba(83, 111, 85, 0.14);
        padding-right: 30px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 54px;
        height: 54px;
        border-radius: 10px;
        background: var(--ink);
        color: #ffffff;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 0;
      }

      .brand span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
        line-height: 1.1;
      }

      .brand strong {
        display: block;
        margin-top: 5px;
        color: var(--ink);
        font-size: 25px;
        font-weight: 900;
        line-height: 1.08;
        letter-spacing: 0;
      }

      nav {
        display: grid;
        gap: 12px;
      }

      .entry-panel {
        display: grid;
        gap: 12px;
      }

      .login-card {
        width: min(320px, 100%);
        justify-self: center;
        transform: translateX(-34px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(254, 255, 252, 0.58);
        padding: 16px;
        box-shadow: 0 8px 18px rgba(31, 47, 30, 0.023);
      }

      .login-card form {
        display: grid;
        gap: 10px;
      }

      .entry-actions {
        display: flex;
        justify-content: flex-end;
      }

      .lock-button {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(254, 255, 252, 0.6);
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 850;
        padding: 0 12px;
      }

      .lock-button:hover,
      .lock-button:focus-visible {
        border-color: #8aa39f;
        color: var(--ink);
        outline: none;
      }

      .field {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
      }

      .field span {
        color: var(--muted);
        font-size: 14px;
        font-weight: 850;
      }

      input {
        width: 100%;
        height: 40px;
        border: 1px solid #c9dac3;
        border-radius: 8px;
        background: #fefffd;
        color: var(--ink);
        font: inherit;
        font-size: 15px;
        font-weight: 760;
        outline: none;
        padding: 0 10px;
      }

      input:focus {
        border-color: #9fbe96;
        box-shadow: 0 0 0 3px rgba(83, 111, 85, 0.1);
      }

      .login-button {
        min-height: 40px;
        border: 1px solid var(--accent-line);
        border-radius: 8px;
        background: var(--accent-soft);
        color: #4b684c;
        cursor: pointer;
        font: inherit;
        font-size: 15px;
        font-weight: 900;
      }

      .login-button:hover,
      .login-button:focus-visible {
        border-color: #9fbe96;
        background: #e5f2e0;
        outline: none;
      }

      .reset-button {
        min-height: 28px;
        border: 0;
        background: transparent;
        color: #6f7c6d;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 800;
        justify-self: end;
        padding: 0 2px;
      }

      .reset-button:hover,
      .reset-button:focus-visible {
        color: var(--ink);
        text-decoration: underline;
        outline: none;
      }

      .login-note {
        min-height: 16px;
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 760;
        line-height: 1.4;
      }

      .login-note[data-tone="error"] {
        color: #b42318;
      }

      .entry-panel[data-locked="false"] .login-card,
      .entry-panel[data-locked="true"] .entry-actions,
      .entry-panel[data-locked="true"] nav {
        display: none;
      }

      a {
        min-height: 78px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        display: grid;
        grid-template-columns: minmax(0, 1fr) 38px;
        align-items: center;
        padding: 0 18px 0 22px;
        text-decoration: none;
        box-shadow: 0 12px 30px rgba(31, 47, 30, 0.05);
        transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      }

      a:hover,
      a:focus-visible {
        border-color: #9fbe96;
        background: #ffffff;
        transform: translateX(3px);
        box-shadow: 0 16px 34px rgba(31, 47, 30, 0.075);
        outline: none;
      }

      .name {
        font-family: "PingFang TC", "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 21px;
        font-weight: 850;
        line-height: 1.2;
      }

      .arrow {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: var(--accent);
        color: #ffffff;
        font-size: 18px;
        font-weight: 900;
        line-height: 1;
      }

      a.draft-alert {
        border-color: #d9a441;
        background: #fff6df;
        box-shadow: 0 12px 30px rgba(184, 121, 23, 0.08);
      }

      a.draft-alert:hover,
      a.draft-alert:focus-visible {
        border-color: #c8871a;
        background: #fff3d2;
        box-shadow: 0 16px 34px rgba(184, 121, 23, 0.12);
      }

      a.draft-alert .arrow {
        background: #b87917;
      }

      @media (max-width: 760px) {
        main {
          min-height: auto;
          grid-template-columns: 1fr;
          align-items: start;
          gap: 24px;
          padding: 24px 0;
        }

        .identity {
          border-right: 0;
          padding-right: 0;
        }

        .brand strong {
          font-size: 24px;
        }

        .login-card {
          transform: none;
        }

        .name {
          font-size: 21px;
        }

        .field {
          grid-template-columns: 1fr;
          gap: 7px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="identity" aria-label="Hour Jungle 營運工作台">
        <div class="brand">
          <div class="mark">HJ</div>
          <div>
            <span>HOUR JUNGLE</span>
            <strong>營運工作台</strong>
          </div>
        </div>
      </section>

      <section class="entry-panel" data-locked="true" aria-label="入口登入">
        <div class="login-card">
          <form id="loginForm" autocomplete="off">
            <label class="field">
              <span>帳號：</span>
              <input id="accountInput" name="hj_entry_account" type="search" autocomplete="one-time-code" autocapitalize="off" spellcheck="false" data-lpignore="true" data-form-type="other" />
            </label>
            <label class="field">
              <span>密碼：</span>
              <input id="passwordInput" name="hj_entry_password" type="password" autocomplete="new-password" data-lpignore="true" data-form-type="other" />
            </label>
            <button class="login-button" id="loginButton" type="submit">登入</button>
            <p class="login-note" id="loginNote"></p>
            <button class="reset-button" id="resetButton" type="button" hidden>重設入口密碼</button>
          </form>
        </div>

        <div class="entry-actions">
          <button class="lock-button" id="lockButton" type="button">鎖定入口</button>
        </div>

        <nav aria-label="系統主畫面">
          <a href="./quote.html"><span class="name">報價單</span><span class="arrow">→</span></a>
          <a href="./contracts.html?venue=taichung"><span class="name">合約書</span><span class="arrow">→</span></a>
          <a href="./crm.html?venue=taichung"><span class="name">CRM</span><span class="arrow">→</span></a>
          <a href="./payments.html"><span class="name">繳費表</span><span class="arrow">→</span></a>
          <a href="./drafts.html" data-home-drafts-entry><span class="name">訊息草稿</span><span class="arrow">→</span></a>
        </nav>
      </section>
    </main>
    <script src="./db-client.js?v=20260702-home-draft-alert-1"></script>
    <script>
      const allowedAccountHashes = [
        "98a145809a5c9c8bec786adb9a7a9822f587adb0d650ab0b55ae89939458197f",
        "24d01bdac1b7a8fa3464270e827448baf645cad8f6edf7414574df90f54cc1f1",
      ];
      const authKey = "hj-home-auth-v2";
      const unlockKey = "hj-home-unlock-until-v2";
      const failKey = "hj-home-login-fail-v2";
      const legacySessionKey = "hj-home-session-v1";
      const oldAuthKeys = ["hj-home-auth-v1"];
      const oldUnlockKeys = ["hj-home-unlock-until-v1"];
      const unlockDurationMs = 5 * 60 * 60 * 1000;
      const maxFailCount = 5;
      const cooldownMs = 2 * 60 * 1000;
      const isLocalTest = window.location.protocol === "file:" || ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
      const panel = document.querySelector("[data-locked]");
      const form = document.querySelector("#loginForm");
      const accountInput = document.querySelector("#accountInput");
      const passwordInput = document.querySelector("#passwordInput");
      const loginButton = document.querySelector("#loginButton");
      const lockButton = document.querySelector("#lockButton");
      const resetButton = document.querySelector("#resetButton");
      const loginNote = document.querySelector("#loginNote");
      const draftsEntry = document.querySelector("[data-home-drafts-entry]");
      const noticeStorageKey = "hjDraftNoticeLogV1";
      const followUpDays = 6;
      const msPerDay = 24 * 60 * 60 * 1000;
      let lockTimer = null;
      let draftAlertTimer = null;

      const bytesToHex = (bytes) => [...bytes].map((byte) => byte.toString(16).padStart(2, "0")).join("");

      const hashText = async (value) => {
        const bytes = new TextEncoder().encode(String(value || ""));
        const digest = await crypto.subtle.digest("SHA-256", bytes);
        return bytesToHex(new Uint8Array(digest));
      };

      const accountHash = (account) => hashText(String(account || "").trim().toLowerCase());

      const hashCredential = async (account, password, salt) => {
        const payload = `${salt}\n${account.trim().toLowerCase()}\n${password}`;
        return hashText(payload);
      };

      const createSalt = () => {
        const bytes = new Uint8Array(16);
        crypto.getRandomValues(bytes);
        return bytesToHex(bytes);
      };

      const savedAuth = () => {
        try {
          return JSON.parse(localStorage.getItem(authKey) || "null");
        } catch {
          return null;
        }
      };

      const hasSavedCredential = () => {
        const auth = savedAuth();
        if (!auth) return false;
        if (auth.accounts && Object.keys(auth.accounts).length) return true;
        return Boolean(auth.salt && auth.hash);
      };

      const credentialFor = async (account) => {
        const auth = savedAuth();
        if (!auth) return null;
        const key = await accountHash(account);
        if (auth.accounts?.[key]) return auth.accounts[key];
        if (auth.account && auth.account === account.trim().toLowerCase() && auth.salt && auth.hash) {
          return { salt: auth.salt, hash: auth.hash };
        }
        return null;
      };

      const saveCredential = async (account, credential) => {
        const auth = savedAuth();
        const key = await accountHash(account);
        const accounts = auth?.accounts ? { ...auth.accounts } : {};
        if (auth?.account && auth.salt && auth.hash) {
          accounts[await accountHash(auth.account)] = { salt: auth.salt, hash: auth.hash };
        }
        accounts[key] = credential;
        localStorage.setItem(authKey, JSON.stringify({ version: 3, accounts }));
      };

      const nextUrl = () => {
        const raw = new URLSearchParams(window.location.search).get("next") || "";
        if (!raw) return "";
        try {
          const url = new URL(raw, window.location.href);
          return url.origin === window.location.origin ? url.href : "";
        } catch {
          return "";
        }
      };

      const unlockedUntil = () => Number(localStorage.getItem(unlockKey) || 0);
      const hasValidUnlock = () => isLocalTest || (hasSavedCredential() && unlockedUntil() > Date.now());
      const failedState = () => {
        try {
          return JSON.parse(localStorage.getItem(failKey) || "null") || { count: 0, cooldownUntil: 0 };
        } catch {
          return { count: 0, cooldownUntil: 0 };
        }
      };

      const cooldownRemainingMs = () => Math.max(0, Number(failedState().cooldownUntil || 0) - Date.now());
      const clearFailures = () => localStorage.removeItem(failKey);

      const recordFailure = () => {
        const current = failedState();
        const count = Number(current.count || 0) + 1;
        const cooldownUntil = count >= maxFailCount ? Date.now() + cooldownMs : 0;
        localStorage.setItem(failKey, JSON.stringify({ count, cooldownUntil }));
        return { count, cooldownUntil };
      };

      const formatRemaining = () => {
        const minutes = Math.max(0, Math.ceil((unlockedUntil() - Date.now()) / 60000));
        const hours = Math.floor(minutes / 60);
        const rest = minutes % 60;
        if (hours && rest) return `已解鎖，約 ${hours} 小時 ${rest} 分鐘後自動鎖定。`;
        if (hours) return `已解鎖，約 ${hours} 小時後自動鎖定。`;
        return `已解鎖，約 ${minutes} 分鐘後自動鎖定。`;
      };

      const scheduleAutoLock = () => {
        window.clearTimeout(lockTimer);
        const remaining = unlockedUntil() - Date.now();
        if (remaining > 0) {
          lockTimer = window.setTimeout(lockHome, remaining);
        }
      };

      const unlockHome = () => {
        localStorage.setItem(unlockKey, String(Date.now() + unlockDurationMs));
        sessionStorage.setItem(legacySessionKey, "unlocked");
        setLocked(false);
        setNote(formatRemaining());
        const target = nextUrl();
        if (target) window.location.assign(target);
      };

      const setLocked = (locked) => {
        panel.dataset.locked = String(locked);
        window.clearTimeout(lockTimer);
        if (!locked) {
          accountInput.value = "";
          passwordInput.value = "";
          scheduleAutoLock();
          refreshDraftEntryAlert();
        }
      };

      const setNote = (text, tone = "") => {
        loginNote.textContent = text;
        if (tone) loginNote.dataset.tone = tone;
        else delete loginNote.dataset.tone;
      };

      const validEmail = (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || "").trim());

      const syncMode = () => {
        if (isLocalTest) {
          setLocked(false);
          lockButton.hidden = true;
          resetButton.hidden = true;
          setNote("本機測試模式，入口直接開放。");
          const target = nextUrl();
          if (target) window.location.assign(target);
          return;
        }
        const hasCredential = hasSavedCredential();
        loginButton.textContent = hasCredential ? "登入" : "設定帳號密碼";
        resetButton.hidden = !hasCredential;
        setNote(hasCredential ? "" : "首次使用請先設定帳號密碼。");
        setLocked(!hasValidUnlock());
        if (hasValidUnlock()) setNote(formatRemaining());
        window.requestAnimationFrame(() => {
          if (panel.dataset.locked === "true") {
            accountInput.value = "";
            passwordInput.value = "";
          }
        });
      };

      const lockHome = () => {
        localStorage.removeItem(unlockKey);
        sessionStorage.removeItem(legacySessionKey);
        window.HJ_DB?.signOut?.();
        setLocked(true);
        syncMode();
        accountInput.focus();
      };

      const resetEntrancePassword = async () => {
        localStorage.removeItem(authKey);
        localStorage.removeItem(unlockKey);
        clearFailures();
        oldAuthKeys.forEach((key) => localStorage.removeItem(key));
        oldUnlockKeys.forEach((key) => localStorage.removeItem(key));
        sessionStorage.removeItem(legacySessionKey);
        try {
          await window.HJ_DB?.signOut?.();
        } catch {
          // 入口鎖重設不應被遠端登出狀態卡住。
        }
        accountInput.value = "";
        passwordInput.value = "";
        syncMode();
        setNote("已清除入口密碼，請重新設定。");
        accountInput.focus();
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const account = accountInput.value.trim().toLowerCase();
        const password = passwordInput.value;
        if (!account || !password) {
          setNote("請輸入帳號與密碼。", "error");
          return;
        }
        if (cooldownRemainingMs() > 0) {
          const seconds = Math.ceil(cooldownRemainingMs() / 1000);
          setNote(`密碼錯誤次數過多，請 ${seconds} 秒後再試。`, "error");
          return;
        }
        if (!validEmail(account)) {
          setNote("帳號請使用 Email，這樣資料庫才認得這個使用者。", "error");
          return;
        }
        const key = await accountHash(account);
        if (!allowedAccountHashes.includes(key)) {
          recordFailure();
          setNote("此入口只允許正式帳號登入。", "error");
          return;
        }

        loginButton.disabled = true;
        try {
          const credential = await credentialFor(account);
          if (!credential) {
            await window.HJ_DB.signInOrSignUp(account, password, { preferSignUp: true });
            const salt = createSalt();
            const hash = await hashCredential(account, password, salt);
            await saveCredential(account, { salt, hash });
            clearFailures();
            unlockHome();
            return;
          }

          const hash = await hashCredential(account, password, credential.salt);
          if (hash === credential.hash) {
            await window.HJ_DB.signInOrSignUp(account, password);
            clearFailures();
            unlockHome();
          } else {
            const failure = recordFailure();
            if (failure.cooldownUntil) {
              setNote("密碼錯誤次數過多，已暫停 2 分鐘。", "error");
              return;
            }
            setNote("帳號或密碼不正確。", "error");
          }
        } catch (error) {
          const failure = recordFailure();
          if (failure.cooldownUntil) {
            setNote("登入失敗次數過多，已暫停 2 分鐘。", "error");
            return;
          }
          setNote(`登入失敗：${error.message || "請稍後再試"}`, "error");
        } finally {
          loginButton.disabled = false;
        }
      });

      lockButton.addEventListener("click", lockHome);
      resetButton.addEventListener("click", resetEntrancePassword);
      window.addEventListener("storage", (event) => {
        if (event.key === unlockKey && !hasValidUnlock()) syncMode();
        if (event.key === noticeStorageKey) refreshDraftEntryAlert();
      });

      syncMode();

      function todayDateKey(date = new Date()) {
        return date.toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
      }

      function dateFromKey(value) {
        const parsed = new Date(`${value}T00:00:00+08:00`);
        return Number.isNaN(parsed.getTime()) ? null : parsed;
      }

      function daysSinceDateKey(dateKey) {
        const start = dateFromKey(dateKey);
        const today = dateFromKey(todayDateKey());
        if (!start || !today) return null;
        return Math.max(0, Math.floor((today - start) / msPerDay));
      }

      function normalizePaymentText(value) {
        return String(value || "")
          .replace(/[！-～]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0xfee0))
          .replaceAll("　", " ")
          .trim();
      }

      function normalizeCustomerId(value) {
        const raw = normalizePaymentText(value);
        return /^v/i.test(raw) ? raw.toUpperCase() : raw;
      }

      function normalizeCycleValue(value) {
        return normalizePaymentText(value).toUpperCase().replaceAll("Ｍ", "M").replaceAll("Ｙ", "Y");
      }

      function parseFullRocDateParts(value) {
        const text = normalizePaymentText(value);
        const compactMatch = text.match(/^(\d{2,3})(\d{2})(\d{2})$/);
        const slashCompactMatch = text.match(/^(\d{2,3})[/.年-](\d{2})(\d{2})$/);
        const regularMatch = text.match(/(\d{2,3})[/.年-](\d{1,2})[/.月-](\d{1,2})/);
        const match = compactMatch || slashCompactMatch || regularMatch;
        if (!match) return null;
        const rocYear = Number(match[1]);
        const monthNumber = Number(match[2]);
        const day = Number(match[3]);
        if (!Number.isInteger(rocYear) || !Number.isInteger(monthNumber) || !Number.isInteger(day)) return null;
        if (monthNumber < 1 || monthNumber > 12 || day < 1 || day > 31) return null;
        return { rocYear, westernYear: rocYear + 1911, monthNumber, day };
      }

      function daysInMonth(year, monthNumber) {
        return new Date(year, monthNumber, 0).getDate();
      }

      function addMonths(year, monthNumber, months) {
        const absolute = year * 12 + (monthNumber - 1) + months;
        return {
          year: Math.floor(absolute / 12),
          monthNumber: (absolute % 12) + 1,
        };
      }

      function addCalendarMonthsClamped(year, monthNumber, day, months) {
        const target = addMonths(year, monthNumber, months);
        return {
          ...target,
          day: Math.min(day, daysInMonth(target.year, target.monthNumber)),
        };
      }

      function shiftDateParts(year, monthNumber, day, days) {
        const date = new Date(Date.UTC(year, monthNumber - 1, day + days));
        return {
          year: date.getUTCFullYear(),
          monthNumber: date.getUTCMonth() + 1,
          day: date.getUTCDate(),
        };
      }

      function previousWorkdayIfWeekend(dateParts) {
        const dayOfWeek = new Date(Date.UTC(dateParts.year, dateParts.monthNumber - 1, dateParts.day)).getUTCDay();
        if (dayOfWeek === 6) return shiftDateParts(dateParts.year, dateParts.monthNumber, dateParts.day, -1);
        if (dayOfWeek === 0) return shiftDateParts(dateParts.year, dateParts.monthNumber, dateParts.day, -2);
        return dateParts;
      }

      function renewalNoticeForPaymentRow(row) {
        const end = parseFullRocDateParts(row?.end);
        if (!end) return null;
        const rawNotice = addCalendarMonthsClamped(end.westernYear, end.monthNumber, end.day, -1);
        const notice = previousWorkdayIfWeekend(rawNotice);
        return {
          year: notice.year,
          monthNumber: notice.monthNumber,
          dateKey: `${notice.year}-${String(notice.monthNumber).padStart(2, "0")}-${String(notice.day).padStart(2, "0")}`,
        };
      }

      function stableRenewalLeadDraftId(row, venue, notice) {
        const key = [
          "renewal-lead",
          notice.year,
          venue,
          `${notice.monthNumber}月`,
          notice.dateKey,
          normalizeCustomerId(row.id),
          normalizePaymentText(row.company),
          normalizePaymentText(row.name),
          normalizeCycleValue(row.cycle),
          normalizePaymentText(row.start),
          normalizePaymentText(row.end),
        ].join("|");
        let hash = 0;
        for (let index = 0; index < key.length; index += 1) {
          hash = (hash * 31 + key.charCodeAt(index)) >>> 0;
        }
        return `renewal-${notice.year}-${venue}-${notice.monthNumber}-${normalizeCustomerId(row.id) || "noid"}-${hash.toString(36)}`;
      }

      function readNoticeLog() {
        try {
          const saved = JSON.parse(localStorage.getItem(noticeStorageKey) || "{}");
          return saved && typeof saved === "object" ? saved : {};
        } catch {
          return {};
        }
      }

      function hasActiveNotice(itemId, noticeLog) {
        const lastNotifiedAt = noticeLog?.[itemId]?.lastNotifiedAt;
        if (!lastNotifiedAt) return false;
        const age = daysSinceDateKey(lastNotifiedAt);
        return age !== null && age < followUpDays;
      }

      function isClosingOrNonbillableRow(row) {
        const text = `${row?.section || ""} ${row?.note || ""} ${row?.manualStatus || ""}`;
        return /遷出|退款|已結束|結束|不續約|不續|已歇業|不收款/.test(text);
      }

      function isPaymentCompleteRow(row) {
        return Boolean(normalizePaymentText(row?.paidAmount));
      }

      function rowHasNotifiedNote(row) {
        return /已通知|已貼|提醒/.test(normalizePaymentText(row?.note));
      }

      function rowNeedsRenewalLead(row) {
        if (!row || isClosingOrNonbillableRow(row) || isPaymentCompleteRow(row) || rowHasNotifiedNote(row)) return false;
        if (!normalizeCustomerId(row.id) && !row.company && !row.name) return false;
        return Boolean(parseFullRocDateParts(row.end));
      }

      function itemNeedsHomeDraftAlert(item, noticeLog) {
        if (!item || item.kind !== "續約") return false;
        if (hasActiveNotice(item.id, noticeLog)) return false;
        const status = item.status || "today";
        return status === "today" || status === "needs-check";
      }

      function generatedRenewalNeedsHomeAlert(data, noticeLog) {
        const yearsByVenue = data?.paymentImportedByYear || {};
        const today = todayDateKey();
        return Object.entries(yearsByVenue).some(([venue, byYear]) =>
          Object.values(byYear || {}).some((byMonth) =>
            Object.values(byMonth || {}).some((rows) =>
              (rows || []).some((row) => {
                if (!rowNeedsRenewalLead(row)) return false;
                const notice = renewalNoticeForPaymentRow(row);
                if (!notice || notice.dateKey > today) return false;
                return !hasActiveNotice(stableRenewalLeadDraftId(row, venue, notice), noticeLog);
              }),
            ),
          ),
        );
      }

      async function refreshDraftEntryAlert() {
        window.clearTimeout(draftAlertTimer);
        draftAlertTimer = window.setTimeout(async () => {
          if (!draftsEntry || panel.dataset.locked === "true" || !window.HJ_DB?.loadPlatformData) return;
          try {
            const noticeLog = readNoticeLog();
            const data = await window.HJ_DB.loadPlatformData();
            const savedDraftNeedsAlert = (data?.draftItems || []).some((item) => itemNeedsHomeDraftAlert(item, noticeLog));
            const generatedDraftNeedsAlert = generatedRenewalNeedsHomeAlert(data, noticeLog);
            draftsEntry.classList.toggle("draft-alert", savedDraftNeedsAlert || generatedDraftNeedsAlert);
          } catch (error) {
            draftsEntry.classList.remove("draft-alert");
          }
        }, 120);
      }
    </script>
  </body>
</html>
